<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Coincidencia Más Linda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Georgia', serif;
            background-color: #0d0d0d;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .background-image {
            width: 100%;
            height: 100%;
            background-image: url('foto.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) contrast(1.05);
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(13, 13, 13, 0.7) 0%, rgba(255, 182, 193, 0.15) 100%);
            z-index: 2;
        }
        .content-card {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 35px 25px;
            max-width: 500px;
            width: 85%;
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        .romantic-text {
            color: #ffffff;
            font-size: 1.8rem;
            line-height: 1.5;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        .romantic-text span {
            color: #ffb6c1; 
            font-weight: bold;
        }
        .music-btn {
            position: absolute;
            bottom: 40px;
            z-index: 4;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 12px 26px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        @media (max-width: 768px) {
            .romantic-text {
                font-size: 1.45rem;
            }
            .content-card {
                padding: 25px 20px;
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="background-image"></div>
        <div class="overlay"></div>
    </div>

    <div class="content-card">
        <p class="romantic-text">
            "Mi vida, cada dia que pasa es mas especial que el anterior, cada dia me das nuevos motivos para ser mas feliz, y es lindo pensar que todo partio un 5 de mayo, con ese besito tan especial, <span>Feliz cumple mes de nuestro primer besito</span>, Te amo mi Javi"
        </p>
    </div>

    <button class="music-btn" id="musicToggle">REPRODUCIR MÚSICA</button>
    <audio id="romanticAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('romanticAudio');
        const btn = document.getElementById('musicToggle');
        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => console.log("Bloqueado:", e));
                btn.textContent = "PAUSAR MÚSICA";
                btn.style.borderColor = "#ffb6c1";
            } else {
                audio.pause();
                btn.textContent = "REPRODUCIR MÚSICA";
                btn.style.borderColor = "rgba(255, 255, 255, 0.2)";
            }
        });
    </script>
</body>
</html>
